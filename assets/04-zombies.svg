    <text x="286" y="688" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">P</text>
    <text x="306" y="682" font-size="13" font-weight="600" fill="#0F172A">api.posthog.com</text>
    <text x="306" y="698" font-size="11" font-family="ui-monospace, 'Cascadia Code', monospace" fill="#64748B">POST /capture/</text>

    <text x="780" y="682" font-size="13" fill="#334155">web-frontend (server-side)</text>
