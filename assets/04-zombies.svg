    <text x="1010" y="562" font-size="13" fill="#334155">2026-03-20</text>
    <text x="1010" y="578" font-size="11" fill="#94A3B8">52 days ago</text>

    <rect x="1146" y="550" width="64" height="28" rx="14" fill="#FED7AA"/>
    <text x="1178" y="568" font-size="13" font-weight="700" fill="#9A3412" text-anchor="middle">52</text>

    <rect x="1268" y="552" width="56" height="24" rx="6" fill="#0F172A"/>
    <text x="1296" y="568" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">Bury</text>
    <line x1="252" y1="598" x2="1342" y2="598" stroke="#F1F5F9"/>

    <!-- Row 4: 24 days -->
    <rect x="276" y="614" width="20" height="20" rx="4" fill="#EB5424"/>
    <text x="286" y="628" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">A</text>
    <text x="306" y="622" font-size="13" font-weight="600" fill="#0F172A">api.algolia.com</text>
