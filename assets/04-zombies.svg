    <rect x="1268" y="612" width="80" height="24" rx="6" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="1308" y="628" font-size="11" font-weight="600" fill="#475569" text-anchor="middle">Investigate</text>
    <line x1="252" y1="658" x2="1342" y2="658" stroke="#F1F5F9"/>

    <!-- Row 5: 11 days -->
