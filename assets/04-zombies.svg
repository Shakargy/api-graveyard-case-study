    <rect x="1146" y="490" width="64" height="28" rx="14" fill="#FED7AA"/>
    <text x="1178" y="508" font-size="13" font-weight="700" fill="#9A3412" text-anchor="middle">73</text>

    <rect x="1268" y="492" width="56" height="24" rx="6" fill="#0F172A"/>
    <text x="1296" y="508" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">Bury</text>
    <line x1="252" y1="538" x2="1342" y2="538" stroke="#F1F5F9"/>

