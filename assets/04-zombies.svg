    <rect x="1146" y="670" width="64" height="28" rx="14" fill="#FEF3C7"/>
    <text x="1178" y="688" font-size="13" font-weight="700" fill="#92400E" text-anchor="middle">11</text>

    <rect x="1268" y="672" width="80" height="24" rx="6" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="1308" y="688" font-size="11" font-weight="600" fill="#475569" text-anchor="middle">Investigate</text>

    <!-- footer -->
    <line x1="252" y1="784" x2="1342" y2="784" stroke="#F1F5F9"/>
    <text x="276" y="810" font-size="12" fill="#94A3B8">Showing 5 of 5 zombie endpoints across 5 services.</text>
    <text x="276" y="828" font-size="11" fill="#94A3B8">"Bury" archives the endpoint and stops surfacing it in alerts. Reversible from Settings → Archive.</text>
