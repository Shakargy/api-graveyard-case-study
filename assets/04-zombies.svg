    <text x="306" y="458" font-size="11" font-family="ui-monospace, 'Cascadia Code', monospace" fill="#64748B">GET /repos/{owner}/{repo}/contributors/stats</text>

    <text x="780" y="442" font-size="13" fill="#334155">analytics-cron</text>
    <text x="780" y="458" font-size="11" fill="#94A3B8">decommissioned 2025-12</text>

    <text x="1010" y="442" font-size="13" fill="#334155">2025-12-20</text>
    <text x="1010" y="458" font-size="11" fill="#94A3B8">5 months ago</text>

