    <text x="306" y="562" font-size="13" font-weight="600" fill="#0F172A">api.dropboxapi.com</text>
    <text x="306" y="578" font-size="11" font-family="ui-monospace, 'Cascadia Code', monospace" fill="#64748B">POST /2/files/upload</text>

    <text x="780" y="562" font-size="13" fill="#334155">export-worker</text>
