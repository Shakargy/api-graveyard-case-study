<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="logoGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="cardShadow2" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#0F172A" flood-opacity="0.04"/>
    </filter>
    <filter id="nodeShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1400" height="900" fill="#F8FAFC"/>

  <!-- Sidebar (collapsed/shared) -->
  <rect x="0" y="0" width="220" height="900" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="20" y="20" width="24" height="24" rx="6" fill="url(#logoGrad2)"/>
  <path d="M26 32 L30 36 L40 26" stroke="#FFFFFF" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="54" y="38" font-size="15" font-weight="700" fill="#0F172A">API Graveyard</text>

  <text x="20" y="86" font-size="11" font-weight="600" fill="#94A3B8" letter-spacing="0.05em">OVERVIEW</text>
  <text x="46" y="121" font-size="13" fill="#334155">Dashboard</text>
  <rect x="12" y="134" width="196" height="36" rx="8" fill="#EEF2FF"/>
  <text x="46" y="157" font-size="13" font-weight="600" fill="#4F46E5">Dependencies</text>
  <text x="46" y="193" font-size="13" fill="#334155">Risk events</text>
  <rect x="160" y="180" width="22" height="18" rx="9" fill="#DC2626"/>
  <text x="171" y="193" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">3</text>
  <text x="46" y="229" font-size="13" fill="#334155">Zombie APIs</text>
  <rect x="160" y="216" width="22" height="18" rx="9" fill="#F1F5F9"/>
  <text x="171" y="229" font-size="11" font-weight="600" fill="#475569" text-anchor="middle">5</text>
  <text x="46" y="265" font-size="13" fill="#334155">Webhooks</text>
  <text x="20" y="318" font-size="11" font-weight="600" fill="#94A3B8" letter-spacing="0.05em">PROJECT</text>
  <text x="46" y="341" font-size="13" fill="#334155">Integrations</text>
  <text x="46" y="377" font-size="13" fill="#334155">Members</text>
  <text x="46" y="413" font-size="13" fill="#334155">Settings</text>

  <rect x="12" y="828" width="196" height="56" rx="8" fill="#F8FAFC"/>
  <circle cx="36" cy="856" r="14" fill="#6366F1"/>
  <text x="36" y="861" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">AS</text>
  <text x="60" y="852" font-size="13" font-weight="600" fill="#0F172A">Aviad Shakargy</text>
  <text x="60" y="868" font-size="11" fill="#64748B">Owner · Free</text>

  <!-- Top bar -->
  <rect x="220" y="0" width="1180" height="64" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="244" y="18" width="184" height="32" rx="8" fill="#FFFFFF" stroke="#E2E8F0"/>
  <circle cx="262" cy="34" r="6" fill="#10B981"/>
  <text x="276" y="38" font-size="13" font-weight="600" fill="#0F172A">acme-prod</text>
  <rect x="442" y="22" width="92" height="24" rx="12" fill="#ECFDF5"/>
  <circle cx="456" cy="34" r="3" fill="#10B981"/>
  <text x="466" y="38" font-size="12" font-weight="600" fill="#047857">production</text>
  <circle cx="1296" cy="34" r="16" fill="#6366F1"/>
  <text x="1296" y="39" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">AS</text>

  <!-- Page title -->
  <text x="252" y="106" font-size="24" font-weight="700" fill="#0F172A">Dependency graph</text>
  <text x="252" y="130" font-size="13" fill="#64748B">Auto-built from SDK events. Line width = 24h call volume. Color = current risk level.</text>

  <!-- Toolbar -->
  <rect x="252" y="150" width="120" height="32" rx="8" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="268" y="171" font-size="12" fill="#475569">Layout: radial</text>
  <path d="M352 165 l6 6 l6 -6" stroke="#94A3B8" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="384" y="150" width="160" height="32" rx="8" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="400" y="171" font-size="12" fill="#475569">Filter: all services</text>
  <path d="M524 165 l6 6 l6 -6" stroke="#94A3B8" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Main graph card -->
  <g filter="url(#cardShadow2)">
    <rect x="252" y="200" width="1090" height="650" rx="12" fill="#FFFFFF" stroke="#E2E8F0"/>

    <!-- Subtle grid -->
    <g stroke="#F1F5F9" stroke-width="1">
      <line x1="252" y1="260" x2="1342" y2="260"/>
      <line x1="252" y1="360" x2="1342" y2="360"/>
      <line x1="252" y1="460" x2="1342" y2="460"/>
      <line x1="252" y1="560" x2="1342" y2="560"/>
      <line x1="252" y1="660" x2="1342" y2="660"/>
      <line x1="252" y1="760" x2="1342" y2="760"/>
    </g>

    <!-- Edges from services to external APIs -->
    <!-- Center services: payments-api (560,360), notification-worker (560,520), data-pipeline (560,660), release-gate (560,800)
         External APIs: stripe (1080,260), twilio (1180,400), sendgrid (1200,520), openai (1180,640), slack (1080,760), github (920,800), datadog (920,260), aws (920,420) -->

    <!-- payments-api -> stripe (THICK, AT-RISK red) -->
    <path d="M650 360 Q 820 280 1060 270" stroke="#DC2626" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.9"/>
    <!-- payments-api -> aws (medium green) -->
    <path d="M650 370 Q 780 400 910 425" stroke="#10B981" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>
    <!-- payments-api -> datadog (thin green) -->
    <path d="M640 340 Q 760 300 910 270" stroke="#10B981" stroke-width="1.6" fill="none" stroke-linecap="round" opacity="0.6"/>

    <!-- notification-worker -> twilio (thick green) -->
    <path d="M650 510 Q 880 460 1160 410" stroke="#10B981" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.85"/>
    <!-- notification-worker -> sendgrid (thick amber) -->
    <path d="M650 520 Q 880 520 1180 520" stroke="#F59E0B" stroke-width="4.5" fill="none" stroke-linecap="round" opacity="0.85"/>
    <!-- notification-worker -> datadog (thin) -->
    <path d="M640 500 Q 760 380 910 280" stroke="#10B981" stroke-width="1.6" fill="none" stroke-linecap="round" opacity="0.5"/>

    <!-- data-pipeline -> openai (medium amber, degraded) -->
    <path d="M650 660 Q 880 660 1160 650" stroke="#F59E0B" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.85"/>
    <!-- data-pipeline -> aws (medium) -->
    <path d="M650 650 Q 770 540 910 435" stroke="#10B981" stroke-width="2.6" fill="none" stroke-linecap="round" opacity="0.6"/>
    <!-- data-pipeline -> slack (thin) -->
    <path d="M650 670 Q 820 720 1060 760" stroke="#10B981" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>

    <!-- release-gate -> github (thin) -->
    <path d="M650 800 Q 770 800 900 800" stroke="#10B981" stroke-width="2.2" fill="none" stroke-linecap="round" opacity="0.6"/>
    <!-- release-gate -> slack -->
    <path d="M650 790 Q 820 770 1060 765" stroke="#10B981" stroke-width="1.6" fill="none" stroke-linecap="round" opacity="0.5"/>

    <!-- ===== Service nodes (your backend) ===== -->
    <g filter="url(#nodeShadow)">
      <rect x="500" y="332" width="156" height="56" rx="10" fill="#FFFFFF" stroke="#6366F1" stroke-width="2"/>
      <rect x="510" y="342" width="20" height="20" rx="4" fill="#EEF2FF"/>
      <text x="520" y="356" font-size="11" font-weight="700" fill="#4F46E5" text-anchor="middle">PY</text>
      <text x="538" y="356" font-size="13" font-weight="700" fill="#0F172A">payments-api</text>
      <text x="538" y="372" font-size="11" fill="#64748B">Python · 3 outbound</text>
    </g>

    <g filter="url(#nodeShadow)">
      <rect x="500" y="492" width="156" height="56" rx="10" fill="#FFFFFF" stroke="#6366F1" stroke-width="2"/>
      <rect x="510" y="502" width="20" height="20" rx="4" fill="#EEF2FF"/>
      <text x="520" y="516" font-size="11" font-weight="700" fill="#4F46E5" text-anchor="middle">JS</text>
      <text x="538" y="516" font-size="13" font-weight="700" fill="#0F172A">notification-worker</text>
      <text x="538" y="532" font-size="11" fill="#64748B">Node · 3 outbound</text>
    </g>

    <g filter="url(#nodeShadow)">
      <rect x="500" y="632" width="156" height="56" rx="10" fill="#FFFFFF" stroke="#6366F1" stroke-width="2"/>
      <rect x="510" y="642" width="20" height="20" rx="4" fill="#EEF2FF"/>
      <text x="520" y="656" font-size="11" font-weight="700" fill="#4F46E5" text-anchor="middle">GO</text>
      <text x="538" y="656" font-size="13" font-weight="700" fill="#0F172A">data-pipeline</text>
      <text x="538" y="672" font-size="11" fill="#64748B">Go · 3 outbound</text>
    </g>

    <g filter="url(#nodeShadow)">
      <rect x="500" y="772" width="156" height="56" rx="10" fill="#FFFFFF" stroke="#6366F1" stroke-width="2"/>
      <rect x="510" y="782" width="20" height="20" rx="4" fill="#EEF2FF"/>
      <text x="520" y="796" font-size="11" font-weight="700" fill="#4F46E5" text-anchor="middle">PY</text>
      <text x="538" y="796" font-size="13" font-weight="700" fill="#0F172A">release-gate</text>
      <text x="538" y="812" font-size="11" fill="#64748B">Python · 2 outbound</text>
    </g>

    <!-- ===== External API nodes ===== -->
    <!-- Stripe (at risk) -->
    <g filter="url(#nodeShadow)">
      <circle cx="1110" cy="270" r="32" fill="#FFFFFF" stroke="#DC2626" stroke-width="2"/>
      <rect x="1097" y="257" width="26" height="26" rx="6" fill="#635BFF"/>
      <text x="1110" y="275" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">S</text>
      <text x="1156" y="266" font-size="13" font-weight="700" fill="#0F172A">api.stripe.com</text>
      <rect x="1156" y="276" width="62" height="18" rx="9" fill="#FEE2E2"/>
      <text x="1187" y="289" font-size="10" font-weight="700" fill="#B91C1C" text-anchor="middle">AT-RISK</text>
    </g>

    <!-- Datadog -->
    <g filter="url(#nodeShadow)">
      <circle cx="950" cy="270" r="28" fill="#FFFFFF" stroke="#10B981" stroke-width="2"/>
      <rect x="939" y="259" width="22" height="22" rx="5" fill="#632CA6"/>
      <text x="950" y="275" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">D</text>
      <text x="888" y="262" font-size="12" font-weight="700" fill="#0F172A" text-anchor="end">datadog</text>
    </g>

    <!-- AWS S3 -->
    <g filter="url(#nodeShadow)">
      <circle cx="950" cy="430" r="28" fill="#FFFFFF" stroke="#10B981" stroke-width="2"/>
      <rect x="939" y="419" width="22" height="22" rx="5" fill="#FF9900"/>
      <text x="950" y="435" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">aws</text>
      <text x="888" y="422" font-size="12" font-weight="700" fill="#0F172A" text-anchor="end">s3 (us-east-1)</text>
    </g>

    <!-- Twilio -->
    <g filter="url(#nodeShadow)">
      <circle cx="1200" cy="410" r="30" fill="#FFFFFF" stroke="#10B981" stroke-width="2"/>
      <rect x="1188" y="398" width="24" height="24" rx="5" fill="#F22F46"/>
      <text x="1200" y="415" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">T</text>
      <text x="1244" y="406" font-size="13" font-weight="700" fill="#0F172A">api.twilio.com</text>
      <text x="1244" y="422" font-size="11" fill="#64748B">38.9k calls</text>
    </g>

    <!-- SendGrid -->
    <g filter="url(#nodeShadow)">
      <circle cx="1220" cy="520" r="30" fill="#FFFFFF" stroke="#F59E0B" stroke-width="2"/>
      <rect x="1208" y="508" width="24" height="24" rx="5" fill="#1A82E2"/>
      <text x="1220" y="525" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">S</text>
      <text x="1264" y="516" font-size="13" font-weight="700" fill="#0F172A">api.sendgrid.com</text>
      <rect x="1264" y="526" width="72" height="18" rx="9" fill="#FEF3C7"/>
      <text x="1300" y="539" font-size="10" font-weight="700" fill="#92400E" text-anchor="middle">DEGRADED</text>
    </g>

    <!-- OpenAI -->
    <g filter="url(#nodeShadow)">
      <circle cx="1200" cy="650" r="30" fill="#FFFFFF" stroke="#F59E0B" stroke-width="2"/>
      <rect x="1188" y="638" width="24" height="24" rx="5" fill="#10A37F"/>
      <text x="1200" y="655" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">O</text>
      <text x="1244" y="646" font-size="13" font-weight="700" fill="#0F172A">api.openai.com</text>
      <text x="1244" y="662" font-size="11" fill="#64748B">12.4k · p95 1.8s</text>
    </g>

    <!-- Slack -->
    <g filter="url(#nodeShadow)">
      <circle cx="1110" cy="765" r="28" fill="#FFFFFF" stroke="#10B981" stroke-width="2"/>
      <rect x="1099" y="754" width="22" height="22" rx="5" fill="#4A154B"/>
      <text x="1110" y="770" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">S</text>
      <text x="1156" y="763" font-size="12" font-weight="700" fill="#0F172A">slack.com</text>
    </g>

    <!-- GitHub -->
    <g filter="url(#nodeShadow)">
      <circle cx="940" cy="800" r="28" fill="#FFFFFF" stroke="#10B981" stroke-width="2"/>
      <rect x="929" y="789" width="22" height="22" rx="5" fill="#181717"/>
      <text x="940" y="805" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">G</text>
      <text x="878" y="792" font-size="12" font-weight="700" fill="#0F172A" text-anchor="end">api.github.com</text>
    </g>

  </g>

  <!-- Floating legend (inside canvas) -->
  <g filter="url(#cardShadow2)">
    <rect x="280" y="226" width="200" height="116" rx="10" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="296" y="248" font-size="11" font-weight="700" fill="#64748B" letter-spacing="0.05em">LEGEND</text>

    <line x1="296" y1="266" x2="324" y2="266" stroke="#10B981" stroke-width="4" stroke-linecap="round"/>
    <text x="334" y="270" font-size="12" fill="#334155">Healthy</text>

    <line x1="296" y1="288" x2="324" y2="288" stroke="#F59E0B" stroke-width="4" stroke-linecap="round"/>
    <text x="334" y="292" font-size="12" fill="#334155">Degraded</text>

    <line x1="296" y1="310" x2="324" y2="310" stroke="#DC2626" stroke-width="4" stroke-linecap="round"/>
    <text x="334" y="314" font-size="12" fill="#334155">At risk (breaking change)</text>

    <text x="296" y="334" font-size="11" fill="#94A3B8">Line width = 24h call volume</text>
  </g>
</svg>
